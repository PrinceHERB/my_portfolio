<body>
    <nav class="navbar">

        <button class="mobile-menu-btn" id="mobile-cta"><span></span><span></span><span></span></button>

    <section class="section bg-alt reveal active">
        <div class="container">
            <h2 class="section-title">Get In Touch</h2>
            <div class="contact-wrapper">
                <div class="contact-info">
                    <div class="info-item"><strong>📞 Phone:</strong><p>09979070915</p></div>
                    <div class="info-item"><strong>📧 Email:</strong><p>justinepauldiaz@gmail.com</p></div>

                </form>
