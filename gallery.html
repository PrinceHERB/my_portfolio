<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | Justin Paul Vales</title>
    <link rel="stylesheet" href="qwerty.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="logo-container">
            <div class="logo-circle">JP</div>
            <div class="logo-text">JUSTIN PAUL VALES</div>
        </div>
        <button class="mobile-menu-btn" id="mobile-cta">
            <span></span><span></span><span></span>
        </button>
        <ul class="nav-links" id="nav-list">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="skills.html">Skills</a></li>
            <li><a href="gallery.html">Gallery</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <section class="section reveal active">
        <div class="container">
            <h2 class="section-title">Media Gallery</h2>
            <div class="grid-layout">
                <div class="ui-card">
                    <h3>Project Showcase</h3>
                    <img src="votin_portal.png" alt="Web Voting System" style="width:100%; border-radius: 10px; margin-top: 15px; border: 1px solid #eee;">
                    <img src="Untitled.png" alt="Web Voting System" style="width:100%; border-raddius: 10px; margub-top: 15px; border: 1px solid #eee;">
                </div>

                <div class="ui-card">
                    <h3>System Demo</h3>
                    <div style="margin-top: 15px; position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden;">
                        <iframe
                            style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 10px;"
                            src="https://www.youtube.com/embed/Z0W_LeF44f8"
                            title="YouTube video player"
                            frameborder="0"
                            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                            referrerpolicy="strict-origin-when-cross-origin"
                            allowfullscreen>
                        </iframe>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer class="footer"><div class="container"><p>&copy; 2026 Justin Paul Vales. All Rights Reserved.</p></div></footer>

    <script>
        const mobileBtn = document.getElementById('mobile-cta');
        const navList = document.getElementById('nav-list');
        mobileBtn.addEventListener('click', () => { navList.classList.toggle('show-nav'); });
        document.querySelectorAll('.nav-links a').forEach(link => {
            link.addEventListener('click', () => { navList.classList.remove('show-nav'); });
        });
    </script>
</body>
